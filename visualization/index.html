// ═══════════════════════════════════════════
// SPHERE — 114 surahs on a rotating Fibonacci sphere
// ═══════════════════════════════════════════
function renderSphere(ctx) {
  camera3D.angle += 0.004;

  const SURAH_COUNT = 114;
  const sphereR = radius * 0.7;

  // chapter → group map
  const c2g = {};
  GROUPS.forEach((g, gi) => g.chapters.forEach(ch => { c2g[ch] = gi; }));

  // Wireframe latitude rings
  for (let lat = -3; lat <= 3; lat++) {
    if (lat === 0) continue;
    const yy = (lat / 4) * sphereR;
    const ringR = Math.sqrt(Math.max(0, sphereR * sphereR - yy * yy));
    const segs = 48;
    ctx.beginPath();
    for (let i = 0; i <= segs; i++) {
      const a = (i / segs) * TAU;
      const proj = project3D(ringR * Math.cos(a), yy, ringR * Math.sin(a));
      i === 0 ? ctx.moveTo(proj.x, proj.y) : ctx.lineTo(proj.x, proj.y);
    }
    ctx.strokeStyle = 'rgba(201,168,76,0.05)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  // Equator (slightly brighter)
  {
    const segs = 64;
    ctx.beginPath();
    for (let i = 0; i <= segs; i++) {
      const a = (i / segs) * TAU;
      const proj = project3D(sphereR * Math.cos(a), 0, sphereR * Math.sin(a));
      i === 0 ? ctx.moveTo(proj.x, proj.y) : ctx.lineTo(proj.x, proj.y);
    }
    ctx.strokeStyle = 'rgba(201,168,76,0.1)';
    ctx.lineWidth = 0.6;
    ctx.stroke();
  }
  // Meridian lines
  for (let m = 0; m < 8; m++) {
    const segs = 32;
    ctx.beginPath();
    for (let i = 0; i <= segs; i++) {
      const phi = (i / segs) * Math.PI - Math.PI / 2;
      const a = (m / 8) * TAU;
      const proj = project3D(
        sphereR * Math.cos(phi) * Math.cos(a),
        sphereR * Math.sin(phi),
        sphereR * Math.cos(phi) * Math.sin(a)
      );
      i === 0 ? ctx.moveTo(proj.x, proj.y) : ctx.lineTo(proj.x, proj.y);
    }
    ctx.strokeStyle = 'rgba(201,168,76,0.04)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // All 114 surah points
  const projected = [];
  for (let s = 1; s <= SURAH_COUNT; s++) {
    const phi = Math.acos(1 - 2 * (s - 0.5) / SURAH_COUNT);
    const theta = Math.PI * (1 + Math.sqrt(5)) * (s - 0.5);
    const px = sphereR * Math.cos(theta) * Math.sin(phi);
    const py = sphereR * Math.sin(theta) * Math.sin(phi);
    const pz = sphereR * Math.cos(phi);
    const proj = project3D(px, py, pz);
    projected.push({ surah: s, group: c2g[s], ...proj });
  }

  // Sort back-to-front for proper occlusion
  projected.sort((a, b) => b.z - a.z);

  // Track per-group "front-most" projected point for hover
  const groupFront = GROUPS.map(() => ({ x: 0, y: 0, z: -Infinity }));

  // Draw each surah
  projected.forEach(p => {
    if (p.group === undefined) {
      const sz = Math.max(0.5, 1.2 * p.scale);
      ctx.beginPath();
      ctx.arc(p.x, p.y, sz, 0, TAU);
      ctx.fillStyle = `rgba(224,220,208,${0.15 + p.scale * 0.18})`;
      ctx.fill();
    } else {
      const g = GROUPS[p.group];
      const isHi = hoveredGroup === p.group || lockedGroup === p.group;
      const sz = (isHi ? 5 : 3.5) * p.scale;
      const color = groupColor(g, isHi ? 1 : 0.85);

      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, sz * 3);
      grad.addColorStop(0, groupColor(g, isHi ? 0.55 : 0.28));
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(p.x, p.y, sz * 3, 0, TAU);
      ctx.fill();

      ctx.beginPath();
      ctx.arc(p.x, p.y, sz, 0, TAU);
      ctx.fillStyle = color;
      ctx.fill();

      // Track front-most for hover
      if (p.z > groupFront[p.group].z) {
        groupFront[p.group] = { x: p.x, y: p.y, z: p.z };
      }
    }
  });

  // Update group hover positions after the transition completes
  if (transitionProgress >= 1) {
    groupFront.forEach((c, i) => {
      groupPositions[i].x = c.x;
      groupPositions[i].y = c.y;
      groupPositions[i].r = 8;
    });
  }

  // Caption
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(201,168,76,0.55)';
  ctx.font = '600 11px Inter';
  ctx.fillText('SPHERE OF SURAHS', 20, 20);
  ctx.fillStyle = 'rgba(201,168,76,0.35)';
  ctx.font = '300 10px Inter';
  ctx.fillText('114 surahs · Fibonacci sphere · auto-rotating', 20, 38);
  ctx.fillText("29 Muqatta'at illuminated", 20, 52);
}

// ═══════════════════════════════════════════
// HELIX — Tier 1 / Tier 2 as a double helix
// ═══════════════════════════════════════════
function renderHelix(ctx) {
  camera3D.angle += 0.005;

  const helixR = radius * 0.4;
  const helixH = radius * 1.3;
  const turns = 1.5;
  const segs = 80;

  // Draw a helical strand
  function drawStrand(phaseOffset, color) {
    const pts3 = [];
    for (let i = 0; i <= segs; i++) {
      const t = i / segs;
      const angle = t * TAU * turns + phaseOffset;
      pts3.push({
        x: helixR * Math.cos(angle),
        y: (t - 0.5) * helixH,
        z: helixR * Math.sin(angle)
      });
    }
    const proj = pts3.map(p => project3D(p.x, p.y, p.z));
    ctx.beginPath();
    proj.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  drawStrand(0, 'rgba(245,208,96,0.4)');
  drawStrand(Math.PI, 'rgba(96,245,224,0.4)');

  // Draw rungs between strands at evenly spaced points
  const rungCount = 13;
  for (let i = 0; i < rungCount; i++) {
    const t = (i + 0.5) / rungCount;
    const angle1 = t * TAU * turns;
    const angle2 = angle1 + Math.PI;
    const y3 = (t - 0.5) * helixH;
    const a = project3D(helixR * Math.cos(angle1), y3, helixR * Math.sin(angle1));
    const b = project3D(helixR * Math.cos(angle2), y3, helixR * Math.sin(angle2));
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = 'rgba(201,168,76,0.1)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Place groups along their strand
  const tier1 = GROUPS.filter(g => g.tier === 1);
  const tier2 = GROUPS.filter(g => g.tier === 2);

  function placeGroups(groups, phaseOffset) {
    return groups.map((g, i) => {
      const t = (i + 0.5) / groups.length;
      const angle = t * TAU * turns + phaseOffset;
      const proj = project3D(
        helixR * Math.cos(angle),
        (t - 0.5) * helixH,
        helixR * Math.sin(angle)
      );
      return { ...proj, group: g, gi: GROUPS.indexOf(g) };
    });
  }

  const allNodes = [...placeGroups(tier1, 0), ...placeGroups(tier2, Math.PI)];
  // Depth sort
  allNodes.sort((a, b) => b.z - a.z);

  allNodes.forEach(node => {
    const g = node.group;
    const isHi = hoveredGroup === node.gi || lockedGroup === node.gi;
    const sz = (isHi ? 11 : 8) * node.scale;
    const color = groupColor(g, isHi ? 1 : 0.85);

    const grad = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, sz * 2.5);
    grad.addColorStop(0, groupColor(g, isHi ? 0.55 : 0.28));
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(node.x, node.y, sz * 2.5, 0, TAU);
    ctx.fill();

    drawStar(ctx, node.x, node.y, sz, sz * 0.4, 6, color, null, 1);

    if (transitionProgress >= 1) {
      groupPositions[node.gi].x = node.x;
      groupPositions[node.gi].y = node.y;
      groupPositions[node.gi].r = sz;
    }
  });

  // Caption
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(201,168,76,0.55)';
  ctx.font = '600 11px Inter';
  ctx.fillText('TIER HELIX', 20, 20);
  ctx.fillStyle = 'rgba(201,168,76,0.35)';
  ctx.font = '300 10px Inter';
  ctx.fillText('two strands · Tier 1 (gold) and Tier 2 (cyan)', 20, 38);
  ctx.fillText('twist around the same axis', 20, 52);
}

// ═══════════════════════════════════════════
// ORBITS — 13 groups orbit the central 19
// ═══════════════════════════════════════════
function renderOrbits(ctx) {
  camera3D.angle += 0.0035;

  // Sort groups by count for orbital radius (smallest = closest)
  const sorted = [...GROUPS].map((g, i) => ({ g, i })).sort((a, b) => a.g.count - b.g.count);

  // Draw orbital ellipses, each on its own tilted plane
  sorted.forEach((s, idx) => {
    const orbitR = radius * 0.18 + (idx / GROUPS.length) * radius * 0.72;
    const planeTilt = (idx % 2 === 0 ? 1 : -1) * (0.08 + (idx / GROUPS.length) * 0.28);
    const segs = 64;
    ctx.beginPath();
    for (let i = 0; i <= segs; i++) {
      const a = (i / segs) * TAU;
      const ox = orbitR * Math.cos(a);
      const oz = orbitR * Math.sin(a);
      // Tilt the orbital plane around the X axis
      const oy = oz * Math.sin(planeTilt);
      const oz2 = oz * Math.cos(planeTilt);
      const proj = project3D(ox, oy, oz2);
      i === 0 ? ctx.moveTo(proj.x, proj.y) : ctx.lineTo(proj.x, proj.y);
    }
    ctx.strokeStyle = groupColor(s.g, 0.18);
    ctx.lineWidth = 0.5;
    ctx.stroke();
  });

  // Compute current orbital positions (each group orbits at its own rate)
  const orbiting = sorted.map((s, idx) => {
    const orbitR = radius * 0.18 + (idx / GROUPS.length) * radius * 0.72;
    const planeTilt = (idx % 2 === 0 ? 1 : -1) * (0.08 + (idx / GROUPS.length) * 0.28);
    const phase = (animTime * 0.001 * (1.2 + idx * 0.15)) % TAU;
    const ox = orbitR * Math.cos(phase);
    const oz = orbitR * Math.sin(phase);
    const oy = oz * Math.sin(planeTilt);
    const oz2 = oz * Math.cos(planeTilt);
    const proj = project3D(ox, oy, oz2);
    return { ...proj, gi: s.i, group: s.g };
  });

  // Central 19-pointed star
  const centerProj = project3D(0, 0, 0);
  const cs = centerProj.scale;
  drawStar(ctx, centerProj.x, centerProj.y, 32 * cs, 14 * cs, 19, 'rgba(201,168,76,0.6)', 'rgba(201,168,76,0.08)', 1.5);
  drawStar(ctx, centerProj.x, centerProj.y, 22 * cs, 10 * cs, 19, 'rgba(201,168,76,0.3)', null, 0.5);

  // Glow around center
  const cgrad = ctx.createRadialGradient(centerProj.x, centerProj.y, 0, centerProj.x, centerProj.y, 60 * cs);
  cgrad.addColorStop(0, 'rgba(201,168,76,0.15)');
  cgrad.addColorStop(1, 'transparent');
  ctx.fillStyle = cgrad;
  ctx.beginPath();
  ctx.arc(centerProj.x, centerProj.y, 60 * cs, 0, TAU);
  ctx.fill();

  // Sort orbiting nodes by depth and draw
  orbiting.sort((a, b) => b.z - a.z);
  orbiting.forEach(node => {
    const g = node.group;
    const isHi = hoveredGroup === node.gi || lockedGroup === node.gi;
    const sz = (isHi ? 12 : 8) * node.scale;
    const color = groupColor(g, isHi ? 1 : 0.85);

    const grad = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, sz * 2.5);
    grad.addColorStop(0, groupColor(g, isHi ? 0.55 : 0.28));
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(node.x, node.y, sz * 2.5, 0, TAU);
    ctx.fill();

    drawStar(ctx, node.x, node.y, sz, sz * 0.4, 6, color, null, 1);

    if (transitionProgress >= 1) {
      groupPositions[node.gi].x = node.x;
      groupPositions[node.gi].y = node.y;
      groupPositions[node.gi].r = sz;
    }
  });

  // 19 label at center
  ctx.fillStyle = 'rgba(245,208,96,0.95)';
  ctx.font = `600 ${Math.floor(18 * cs)}px Inter`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('19', centerProj.x, centerProj.y);

  // Caption
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(201,168,76,0.55)';
  ctx.font = '600 11px Inter';
  ctx.fillText('ORBITAL SYSTEM', 20, 20);
  ctx.fillStyle = 'rgba(201,168,76,0.35)';
  ctx.font = '300 10px Inter';
  ctx.fillText('13 groups orbit 19', 20, 38);
  ctx.fillText('orbit radius ∝ letter count · tilted planes', 20, 52);
}

// ═══════════════════════════════════════════
// LATTICE — 19 × 19 × P(29) volume of cells
// ═══════════════════════════════════════════
function renderLattice(ctx) {
  camera3D.angle += 0.003;

  const dimX = 19, dimY = 19, dimZ = 109;
  const spacing = 7;
  const offX = -(dimX - 1) * spacing / 2;
  const offY = -(dimY - 1) * spacing / 2;
  const offZ = -(dimZ - 1) * spacing / 2;

  // Render only a subset of layers for performance — every 7th
  const layerStep = 7;
  const points = [];
  for (let zi = 0; zi < dimZ; zi += layerStep) {
    const z3 = offZ + zi * spacing;
    // For non-edge layers, render only the perimeter to keep things fast
    const isEdge = (zi === 0 || zi >= dimZ - layerStep);
    for (let yi = 0; yi < dimY; yi++) {
      const y3 = offY + yi * spacing;
      const yEdge = (yi === 0 || yi === dimY - 1);
      for (let xi = 0; xi < dimX; xi++) {
        const xEdge = (xi === 0 || xi === dimX - 1);
        if (!isEdge && !yEdge && !xEdge) continue; // hollow shell
        const x3 = offX + xi * spacing;
        const proj = project3D(x3, y3, z3);
        // Pseudo-group id from position for color variety
        const gid = (xi * 31 + yi * 17 + zi * 13) % NUM_GROUPS;
        points.push({ ...proj, gid, isEdge: isEdge || (xEdge && yEdge) });
      }
    }
  }

  // Sort back-to-front
  points.sort((a, b) => b.z - a.z);

  // Draw each cell
  points.forEach(p => {
    const g = GROUPS[p.gid];
    const sz = Math.max(0.5, 1.6 * p.scale);
    const alpha = (0.25 + p.scale * 0.4) * (p.isEdge ? 1 : 0.6);
    ctx.fillStyle = groupColor(g, alpha);
    ctx.beginPath();
    ctx.arc(p.x, p.y, sz, 0, TAU);
    ctx.fill();
  });

  // Outline the bounding box of the lattice
  const corners = [
    [offX, offY, offZ], [offX + (dimX-1)*spacing, offY, offZ],
    [offX + (dimX-1)*spacing, offY + (dimY-1)*spacing, offZ], [offX, offY + (dimY-1)*spacing, offZ],
    [offX, offY, offZ + (dimZ-1)*spacing], [offX + (dimX-1)*spacing, offY, offZ + (dimZ-1)*spacing],
    [offX + (dimX-1)*spacing, offY + (dimY-1)*spacing, offZ + (dimZ-1)*spacing], [offX, offY + (dimY-1)*spacing, offZ + (dimZ-1)*spacing]
  ].map(c => project3D(c[0], c[1], c[2]));
  const edges = [[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
  ctx.strokeStyle = 'rgba(201,168,76,0.18)';
  ctx.lineWidth = 0.5;
  edges.forEach(e => {
    ctx.beginPath();
    ctx.moveTo(corners[e[0]].x, corners[e[0]].y);
    ctx.lineTo(corners[e[1]].x, corners[e[1]].y);
    ctx.stroke();
  });

  // Caption
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(201,168,76,0.55)';
  ctx.font = '600 11px Inter';
  ctx.fillText('LATTICE · 19 × 19 × P(29)', 20, 20);
  ctx.fillStyle = 'rgba(201,168,76,0.35)';
  ctx.font = '300 10px Inter';
  ctx.fillText('39,349 cells in a 3D volume', 20, 38);
  ctx.fillText('the equation as physical space', 20, 52);
}

// ═══════════════════════════════════════════
// TIMELINE — surahs 1-114 with Muqatta'at marked
// ═══════════════════════════════════════════
function renderTimeline(ctx) {
  const xStart = 80;
  const xEnd = W - 80;
  const axisY = cy;
  const SURAH_COUNT = 114;

  // Chapter → group map
  const c2g = {};
  GROUPS.forEach((g, gi) => g.chapters.forEach(ch => { c2g[ch] = gi; }));

  // Main axis line
  ctx.beginPath();
  ctx.moveTo(xStart, axisY);
  ctx.lineTo(xEnd, axisY);
  ctx.strokeStyle = 'rgba(201,168,76,0.25)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Tick marks every 10 surahs
  for (let s = 10; s <= 110; s += 10) {
    const x = lerp(xStart, xEnd, (s - 1) / 113);
    ctx.beginPath();
    ctx.moveTo(x, axisY - 4);
    ctx.lineTo(x, axisY + 4);
    ctx.strokeStyle = 'rgba(201,168,76,0.3)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.fillStyle = 'rgba(201,168,76,0.4)';
    ctx.font = '300 9px Inter';
    ctx.textAlign = 'center';
    ctx.fillText(s, x, axisY + 16);
  }

  // Tier zone backgrounds
  ctx.fillStyle = 'rgba(245,208,96,0.03)';
  ctx.fillRect(xStart, axisY - 130, xEnd - xStart, 110);
  ctx.fillStyle = 'rgba(96,245,224,0.03)';
  ctx.fillRect(xStart, axisY + 30, xEnd - xStart, 110);

  // Labels for tier zones
  ctx.fillStyle = 'rgba(245,208,96,0.5)';
  ctx.font = '600 10px Inter';
  ctx.textAlign = 'left';
  ctx.fillText('TIER 1 — encoding independent', xStart + 6, axisY - 122);
  ctx.fillStyle = 'rgba(96,245,224,0.5)';
  ctx.fillText('TIER 2 — encoding dependent', xStart + 6, axisY + 42);

  // All 114 surahs as small marks
  for (let s = 1; s <= SURAH_COUNT; s++) {
    const x = lerp(xStart, xEnd, (s - 1) / 113);
    const gi = c2g[s];
    if (gi === undefined) {
      ctx.beginPath();
      ctx.arc(x, axisY, 1.5, 0, TAU);
      ctx.fillStyle = 'rgba(224,220,208,0.3)';
      ctx.fill();
    } else {
      const g = GROUPS[gi];
      const isHi = hoveredGroup === gi || lockedGroup === gi;
      const targetY = g.tier === 1 ? axisY - 60 : axisY + 60;
      // Drop line from axis to group node
      ctx.beginPath();
      ctx.moveTo(x, axisY);
      ctx.lineTo(x, targetY);
      ctx.strokeStyle = groupColor(g, isHi ? 0.6 : 0.25);
      ctx.lineWidth = isHi ? 1.2 : 0.5;
      ctx.stroke();
      // Mark on the axis itself
      ctx.beginPath();
      ctx.arc(x, axisY, 2, 0, TAU);
      ctx.fillStyle = groupColor(g, 0.8);
      ctx.fill();
    }
  }

  // Group nodes (use animated positions)
  GROUPS.forEach((g, i) => {
    const gp = groupPositions[i];
    const isHi = hoveredGroup === i || lockedGroup === i;
    const color = groupColor(g, isHi ? 1 : 0.85);

    const grad = ctx.createRadialGradient(gp.x, gp.y, 0, gp.x, gp.y, gp.r * 2.5);
    grad.addColorStop(0, groupColor(g, isHi ? 0.4 : 0.2));
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(gp.x, gp.y, gp.r * 2.5, 0, TAU);
    ctx.fill();

    drawStar(ctx, gp.x, gp.y, gp.r, gp.r * 0.4, 6, color, null, 1);
  });

  // Caption
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(201,168,76,0.55)';
  ctx.font = '600 11px Inter';
  ctx.fillText('READING ORDER', 20, 20);
  ctx.fillStyle = 'rgba(201,168,76,0.35)';
  ctx.font = '300 10px Inter';
  ctx.fillText("114 surahs in order · 29 carry Muqatta'at letters", 20, 38);

  // Legend on the right
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(201,168,76,0.4)';
  ctx.font = '300 10px Inter';
  ctx.fillText('node size ∝ chapters in group', W - 20, 38);
}


// ═══════════════════════════════════════════
// TREE — hierarchical decomposition
// ═══════════════════════════════════════════
function renderTree(ctx) {
  // Root: 39,349
  const rootY = 80;
  const tier2Y = 200;
  const tier3Y = cy + 80;

  // Root node
  const rootR = 38;
  const grad = ctx.createRadialGradient(cx, rootY, 0, cx, rootY, rootR * 1.6);
  grad.addColorStop(0, 'rgba(245,208,96,0.35)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, rootY, rootR * 1.6, 0, TAU);
  ctx.fill();

  drawStar(ctx, cx, rootY, rootR, rootR * 0.45, 19, 'rgba(245,208,96,0.7)', 'rgba(245,208,96,0.05)', 1.5);

  ctx.fillStyle = 'rgba(245,208,96,0.95)';
  ctx.font = '600 16px Inter';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('39,349', cx, rootY);
  ctx.fillStyle = 'rgba(245,208,96,0.55)';
  ctx.font = '300 9px Inter';
  ctx.fillText('19² × P(29)', cx, rootY + rootR + 6);

  // Tier-2 mid nodes: 19² and P(29)
  const midL = cx - 110;
  const midR = cx + 110;
  const midRadius = 26;

  // Connecting lines from root to mid
  ctx.strokeStyle = 'rgba(201,168,76,0.35)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx, rootY + rootR * 0.7);
  ctx.lineTo(midL, tier2Y - midRadius);
  ctx.moveTo(cx, rootY + rootR * 0.7);
  ctx.lineTo(midR, tier2Y - midRadius);
  ctx.stroke();

  // Mid: 19² (gold)
  ctx.beginPath();
  ctx.arc(midL, tier2Y, midRadius, 0, TAU);
  ctx.fillStyle = 'rgba(245,208,96,0.12)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(245,208,96,0.7)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = 'rgba(245,208,96,0.95)';
  ctx.font = '600 14px Inter';
  ctx.fillText('19² = 361', midL, tier2Y);

  // Mid: P(29) (cyan)
  ctx.beginPath();
  ctx.arc(midR, tier2Y, midRadius, 0, TAU);
  ctx.fillStyle = 'rgba(96,245,224,0.12)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(96,245,224,0.7)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = 'rgba(96,245,224,0.95)';
  ctx.font = '600 14px Inter';
  ctx.fillText('P(29) = 109', midR, tier2Y);

  // Connecting arcs from mid nodes to each leaf group
  GROUPS.forEach((g, i) => {
    const gp = groupPositions[i];
    const isHi = hoveredGroup === i || lockedGroup === i;
    const parent = g.tier === 1 ? midL : midR;
    const parentColor = g.tier === 1 ? 'rgba(245,208,96,' : 'rgba(96,245,224,';

    // Curved bezier from parent to leaf
    ctx.beginPath();
    ctx.moveTo(parent, tier2Y + midRadius);
    const midX = (parent + gp.x) / 2;
    const midPY = (tier2Y + gp.y) / 2;
    ctx.bezierCurveTo(parent, midPY, gp.x, midPY, gp.x, gp.y - gp.r);
    ctx.strokeStyle = parentColor + (isHi ? '0.7' : '0.22') + ')';
    ctx.lineWidth = isHi ? 1.5 : 0.5;
    ctx.stroke();
  });

  // Leaf nodes (groups)
  GROUPS.forEach((g, i) => {
    const gp = groupPositions[i];
    const isHi = hoveredGroup === i || lockedGroup === i;
    const color = groupColor(g, isHi ? 1 : 0.85);

    const grad = ctx.createRadialGradient(gp.x, gp.y, 0, gp.x, gp.y, gp.r * 2.5);
    grad.addColorStop(0, groupColor(g, isHi ? 0.45 : 0.22));
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(gp.x, gp.y, gp.r * 2.5, 0, TAU);
    ctx.fill();

    drawStar(ctx, gp.x, gp.y, gp.r, gp.r * 0.4, 6, color, null, 1);

    // Count below each leaf
    ctx.fillStyle = groupColor(g, isHi ? 0.85 : 0.5);
    ctx.font = '300 9px Inter';
    ctx.textAlign = 'center';
    ctx.fillText(g.count.toLocaleString(), gp.x, gp.y + gp.r + 14);
  });

  // Sum row beneath
  ctx.fillStyle = 'rgba(201,168,76,0.55)';
  ctx.font = '300 11px Inter';
  ctx.textAlign = 'center';
  ctx.fillText('Σ all 13 group counts = 39,349  ↺  the tree closes on its root', cx, H - 60);

  // Caption
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(201,168,76,0.55)';
  ctx.font = '600 11px Inter';
  ctx.fillText('FACTORIZATION TREE', 20, 20);
  ctx.fillStyle = 'rgba(201,168,76,0.35)';
  ctx.font = '300 10px Inter';
  ctx.fillText('39,349 → 19² × P(29) → 13 leaves', 20, 38);
}

// ═══════════════════════════════════════════
// COSMOS — five-level fractal as nested 3D shells
// ═══════════════════════════════════════════
function renderCosmos(ctx) {
  camera3D.angle += 0.0035;

  const SURAH_COUNT = 114;
  const c2g = {};
  GROUPS.forEach((g, gi) => g.chapters.forEach(ch => { c2g[ch] = gi; }));

  // Five level radii — outer shell to inner core
  const R1 = radius * 0.95;  // Book
  const R2 = radius * 0.74;  // Chapters
  const R3 = radius * 0.54;  // Groups
  const R4 = radius * 0.34;  // Multipliers
  const R5 = radius * 0.14;  // Terminal core

  // Helpers for sphere wireframe
  function sphereWireframe(R, color, linew, density) {
    // Latitude rings
    for (let lat = -density; lat <= density; lat++) {
      if (lat === 0) continue;
      const yy = (lat / (density + 1)) * R;
      const ringR = Math.sqrt(Math.max(0, R*R - yy*yy));
      const segs = 32;
      ctx.beginPath();
      for (let i = 0; i <= segs; i++) {
        const a = (i / segs) * TAU;
        const proj = project3D(ringR * Math.cos(a), yy, ringR * Math.sin(a));
        i === 0 ? ctx.moveTo(proj.x, proj.y) : ctx.lineTo(proj.x, proj.y);
      }
      ctx.strokeStyle = color;
      ctx.lineWidth = linew;
      ctx.stroke();
    }
    // Meridians
    const merCount = Math.max(4, density * 2);
    for (let m = 0; m < merCount; m++) {
      const segs = 24;
      ctx.beginPath();
      for (let i = 0; i <= segs; i++) {
        const phi = (i / segs) * Math.PI - Math.PI / 2;
        const a = (m / merCount) * TAU;
        const proj = project3D(
          R * Math.cos(phi) * Math.cos(a),
          R * Math.sin(phi),
          R * Math.cos(phi) * Math.sin(a)
        );
        i === 0 ? ctx.moveTo(proj.x, proj.y) : ctx.lineTo(proj.x, proj.y);
      }
      ctx.strokeStyle = color;
      ctx.lineWidth = linew;
      ctx.stroke();
    }
    // Equator (slightly brighter)
    const segs = 48;
    ctx.beginPath();
    for (let i = 0; i <= segs; i++) {
      const a = (i / segs) * TAU;
      const proj = project3D(R * Math.cos(a), 0, R * Math.sin(a));
      i === 0 ? ctx.moveTo(proj.x, proj.y) : ctx.lineTo(proj.x, proj.y);
    }
    ctx.strokeStyle = color.replace(/[\d.]+\)$/, m => (parseFloat(m) * 1.6) + ')');
    ctx.lineWidth = linew + 0.2;
    ctx.stroke();
  }

  // Collect all the points we want to render across all levels,
  // then depth-sort them as a single set so things blend correctly.
  const allPoints = [];

  // ─── LEVEL 1 — Book shell: 114 surahs as a faint distant starfield ───
  for (let s = 1; s <= SURAH_COUNT; s++) {
    const phi = Math.acos(1 - 2 * (s - 0.5) / SURAH_COUNT);
    const theta = Math.PI * (1 + Math.sqrt(5)) * (s - 0.5);
    const x3 = R1 * Math.cos(theta) * Math.sin(phi);
    const y3 = R1 * Math.sin(theta) * Math.sin(phi);
    const z3 = R1 * Math.cos(phi);
    const proj = project3D(x3, y3, z3);
    allPoints.push({
      type: 'l1', x: proj.x, y: proj.y, z: proj.z, scale: proj.scale,
      isMq: c2g[s] !== undefined
    });
  }

  // ─── LEVEL 2 — Chapters shell: 29 Muqatta'at, on the smaller sphere ───
  // Use Fibonacci-sphere placement of just the 29 surahs
  const muqChapters = Object.keys(c2g).map(Number).sort((a, b) => a - b);
  muqChapters.forEach((ch, idx) => {
    const phi = Math.acos(1 - 2 * (idx + 0.5) / muqChapters.length);
    const theta = Math.PI * (1 + Math.sqrt(5)) * (idx + 0.5);
    const x3 = R2 * Math.cos(theta) * Math.sin(phi);
    const y3 = R2 * Math.sin(theta) * Math.sin(phi);
    const z3 = R2 * Math.cos(phi);
    const proj = project3D(x3, y3, z3);
    allPoints.push({
      type: 'l2', x: proj.x, y: proj.y, z: proj.z, scale: proj.scale,
      group: c2g[ch]
    });
  });

  // ─── LEVEL 3 — Groups shell: 13 groups on the third sphere ───
  // Fibonacci sphere placement so they spread cleanly
  const groupNodes3D = [];
  GROUPS.forEach((g, i) => {
    const phi = Math.acos(1 - 2 * (i + 0.5) / NUM_GROUPS);
    const theta = Math.PI * (1 + Math.sqrt(5)) * (i + 0.5);
    const x3 = R3 * Math.cos(theta) * Math.sin(phi);
    const y3 = R3 * Math.sin(theta) * Math.sin(phi);
    const z3 = R3 * Math.cos(phi);
    const proj = project3D(x3, y3, z3);
    const node = { type: 'l3', x: proj.x, y: proj.y, z: proj.z, scale: proj.scale, gi: i };
    allPoints.push(node);
    groupNodes3D.push(node);
  });

  // ─── LEVEL 4 — Multipliers shell: 13 diamonds, same angular position
  // as their corresponding L3 groups, but on the inner sphere ───
  GROUPS.forEach((g, i) => {
    const phi = Math.acos(1 - 2 * (i + 0.5) / NUM_GROUPS);
    const theta = Math.PI * (1 + Math.sqrt(5)) * (i + 0.5);
    const x3 = R4 * Math.cos(theta) * Math.sin(phi);
    const y3 = R4 * Math.sin(theta) * Math.sin(phi);
    const z3 = R4 * Math.cos(phi);
    const proj = project3D(x3, y3, z3);
    allPoints.push({
      type: 'l4', x: proj.x, y: proj.y, z: proj.z, scale: proj.scale, gi: i
    });
  });

  // ─── LEVEL 5 — Terminal: two anchor points (361 & 109) on the core ───
  ['361', '109'].forEach((label, idx) => {
    const a = idx === 0 ? Math.PI/2 : -Math.PI/2;
    const x3 = R5 * Math.cos(a);
    const y3 = R5 * Math.sin(a);
    const proj = project3D(x3, y3, 0);
    allPoints.push({
      type: 'l5', x: proj.x, y: proj.y, z: proj.z, scale: proj.scale, label
    });
  });

  // Center point (the 19 itself)
  const centerProj = project3D(0, 0, 0);

  // ── DRAW PASS 1: faint wireframe shells, back-to-front by radius
  // We draw outer shells first so inner ones overlay them, but inside each
  // shell the lines naturally render correctly because they're 1D.
  sphereWireframe(R1, 'rgba(201,168,76,0.045)', 0.5, 2);
  sphereWireframe(R2, 'rgba(201,168,76,0.075)', 0.5, 2);
  sphereWireframe(R3, 'rgba(201,168,76,0.11)',  0.5, 2);
  sphereWireframe(R4, 'rgba(201,168,76,0.16)',  0.5, 1);
  sphereWireframe(R5, 'rgba(245,208,96,0.25)',  0.5, 1);

  // ── DRAW PASS 2: depth-sort all points and render back-to-front
  allPoints.sort((a, b) => b.z - a.z);

  allPoints.forEach(p => {
    if (p.type === 'l1') {
      // Faint distant starfield — non-Muqatta'at dimmer than Muqatta'at
      const sz = Math.max(0.4, (p.isMq ? 1.6 : 0.9) * p.scale);
      const alpha = (p.isMq ? 0.45 : 0.18) * (0.5 + p.scale * 0.5);
      ctx.beginPath();
      ctx.arc(p.x, p.y, sz, 0, TAU);
      ctx.fillStyle = `rgba(224,220,208,${alpha})`;
      ctx.fill();
    } else if (p.type === 'l2') {
      // Muqatta'at chapter dot, colored by its group
      const g = GROUPS[p.group];
      const isHi = hoveredGroup === p.group || lockedGroup === p.group;
      const sz = (isHi ? 3.5 : 2.5) * p.scale;
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, sz * 2.5);
      grad.addColorStop(0, groupColor(g, isHi ? 0.55 : 0.3));
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(p.x, p.y, sz * 2.5, 0, TAU);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(p.x, p.y, sz, 0, TAU);
      ctx.fillStyle = groupColor(g, isHi ? 1 : 0.85);
      ctx.fill();
    } else if (p.type === 'l3') {
      // Group node — the most prominent shell
      const g = GROUPS[p.gi];
      const isHi = hoveredGroup === p.gi || lockedGroup === p.gi;
      const sz = (isHi ? 9 : 6.5) * p.scale;
      const color = groupColor(g, isHi ? 1 : 0.9);
      // Glow halo
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, sz * 3);
      grad.addColorStop(0, groupColor(g, isHi ? 0.55 : 0.3));
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(p.x, p.y, sz * 3, 0, TAU);
      ctx.fill();
      // 6-pointed star
      drawStar(ctx, p.x, p.y, sz, sz * 0.4, 6, color, null, 1);
    } else if (p.type === 'l4') {
      // Multiplier diamond
      const g = GROUPS[p.gi];
      const isHi = hoveredGroup === p.gi || lockedGroup === p.gi;
      const sz = (isHi ? 5 : 3.5) * p.scale;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y - sz);
      ctx.lineTo(p.x + sz, p.y);
      ctx.lineTo(p.x, p.y + sz);
      ctx.lineTo(p.x - sz, p.y);
      ctx.closePath();
      ctx.fillStyle = groupColor(g, isHi ? 0.85 : 0.6);
      ctx.fill();
      ctx.strokeStyle = groupColor(g, isHi ? 1 : 0.85);
      ctx.lineWidth = 0.6;
      ctx.stroke();
    } else if (p.type === 'l5') {
      // Terminal anchor: small bright gold dot
      const sz = 5 * p.scale;
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, sz * 3);
      grad.addColorStop(0, 'rgba(245,208,96,0.7)');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(p.x, p.y, sz * 3, 0, TAU);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(p.x, p.y, sz * 0.6, 0, TAU);
      ctx.fillStyle = 'rgba(245,208,96,1)';
      ctx.fill();
      // Tiny label
      ctx.fillStyle = 'rgba(245,208,96,0.8)';
      ctx.font = `300 ${Math.floor(9 * p.scale)}px Inter`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.label, p.x, p.y + sz + 8);
    }
  });

  // ── CENTER: 19-pointed star at the very core
  const cs = centerProj.scale;
  drawStar(ctx, centerProj.x, centerProj.y, R5 * 0.6 * cs, R5 * 0.27 * cs, 19,
           'rgba(245,208,96,0.65)', 'rgba(245,208,96,0.08)', 1);
  drawStar(ctx, centerProj.x, centerProj.y, R5 * 0.42 * cs, R5 * 0.19 * cs, 19,
           'rgba(245,208,96,0.35)', null, 0.5);
  ctx.fillStyle = 'rgba(245,208,96,0.95)';
  ctx.font = `600 ${Math.floor(13 * cs)}px Inter`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('19', centerProj.x, centerProj.y);

  // Update group hover positions to the projected L3 nodes (after transition)
  if (transitionProgress >= 1) {
    groupNodes3D.forEach(n => {
      groupPositions[n.gi].x = n.x;
      groupPositions[n.gi].y = n.y;
      groupPositions[n.gi].r = 8;
    });
  }

  // ── LEVEL LABELS in the right margin
  // Sit at fixed screen positions and lead-line into the appropriate sphere.
  const labelX = W - 160;
  const labels = [
    { y: 90,  num: '1', name: 'BOOK',        eq: '332,519 = 19 × 17,501', r: R1 },
    { y: 150, num: '2', name: 'CHAPTERS',    eq: '39,349 = 19² × P(29)',   r: R2 },
    { y: 210, num: '3', name: 'GROUPS',      eq: '13 totals · each ÷ 19',  r: R3 },
    { y: 270, num: '4', name: 'MULTIPLIERS', eq: 'Σk = 19 × 109',          r: R4 },
    { y: 330, num: '5', name: 'TERMINAL',    eq: '109 = P(29) · 361 = 19²',r: R5 }
  ];

  labels.forEach((l, idx) => {
    const intensity = 0.45 + idx * 0.08;
    // Lead line from label to the sphere's right edge
    const sphereEdgeX = cx + l.r * 0.85;
    ctx.beginPath();
    ctx.moveTo(labelX - 6, l.y);
    ctx.lineTo(sphereEdgeX, l.y);
    ctx.strokeStyle = `rgba(201,168,76,${intensity * 0.35})`;
    ctx.lineWidth = 0.5;
    ctx.setLineDash([2, 4]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Label text
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = `rgba(201,168,76,${intensity + 0.2})`;
    ctx.font = '600 10px Inter';
    ctx.fillText(`L${l.num} · ${l.name}`, labelX, l.y - 6);
    ctx.fillStyle = `rgba(201,168,76,${intensity})`;
    ctx.font = '300 9px Inter';
    ctx.fillText(l.eq, labelX, l.y + 6);
  });

  // ── HEADER caption
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(201,168,76,0.6)';
  ctx.font = '600 12px Inter';
  ctx.fillText('THE FIVE-LEVEL FRACTAL', 20, 20);
  ctx.fillStyle = 'rgba(201,168,76,0.4)';
  ctx.font = '300 10px Inter';
  ctx.fillText('19 organises the text at every structural scale', 20, 38);
  ctx.fillText('outer shell = whole book · inner core = terminal factors', 20, 52);
}

// ═══════════════════════════════════════════
// RESONANCE — two centuries, one standing wave
// ═══════════════════════════════════════════
function renderResonance(ctx) {
  const t = animTime * 0.025;
  const leftX = 110;
  const rightX = W - 110;
  const midY = cy;
  const span = rightX - leftX;

  // Two anchor labels
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(245,208,96,0.85)';
  ctx.font = '600 13px Inter';
  ctx.fillText('632 CE', leftX, midY + 70);
  ctx.fillStyle = 'rgba(245,208,96,0.5)';
  ctx.font = '300 10px Inter';
  ctx.fillText('the encoding', leftX, midY + 88);

  ctx.fillStyle = 'rgba(96,245,224,0.85)';
  ctx.font = '600 13px Inter';
  ctx.fillText('2026 CE', rightX, midY + 70);
  ctx.fillStyle = 'rgba(96,245,224,0.5)';
  ctx.font = '300 10px Inter';
  ctx.fillText('the recognition', rightX, midY + 88);

  // Glowing anchor points
  function anchor(x, color, size, glowSize) {
    const grad = ctx.createRadialGradient(x, midY, 0, x, midY, glowSize);
    grad.addColorStop(0, color);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, midY, glowSize, 0, TAU);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x, midY, size, 0, TAU);
    ctx.fillStyle = color.replace(/[\d.]+\)$/, '1)');
    ctx.fill();
  }
  anchor(leftX, 'rgba(245,208,96,0.45)', 6, 50);
  anchor(rightX, 'rgba(96,245,224,0.45)', 6, 50);

  // The standing wave between them — multiple harmonics
  // Wave 1: fundamental
  for (let layer = 0; layer < 5; layer++) {
    const amp = 60 - layer * 8;
    const freq = 4 + layer * 2;
    const phase = layer * Math.PI / 3;
    ctx.beginPath();
    for (let i = 0; i <= 200; i++) {
      const tt = i / 200;
      const x = lerp(leftX, rightX, tt);
      // Standing wave: sin(kx) * sin(ωt)
      const envelope = Math.sin(tt * Math.PI); // taper at endpoints
      const wave = Math.sin(tt * Math.PI * freq) * Math.sin(t + phase);
      const y = midY + wave * amp * envelope;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    const layerAlpha = 0.12 + layer * 0.06;
    const hue = layer % 2 === 0 ? '201,168,76' : '180,200,150';
    ctx.strokeStyle = `rgba(${hue},${layerAlpha})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  // Bright fundamental on top
  ctx.beginPath();
  for (let i = 0; i <= 240; i++) {
    const tt = i / 240;
    const x = lerp(leftX, rightX, tt);
    const envelope = Math.sin(tt * Math.PI);
    const wave = Math.sin(tt * Math.PI * 19) * Math.sin(t * 0.6);
    const y = midY + wave * 55 * envelope;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.strokeStyle = 'rgba(245,208,96,0.55)';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // Nodes of the wave — pulse points where the wave crosses zero
  const nodeCount = 19;
  for (let n = 1; n < nodeCount; n++) {
    const tt = n / nodeCount;
    const x = lerp(leftX, rightX, tt);
    const envelope = Math.sin(tt * Math.PI);
    const pulse = 0.4 + Math.abs(Math.sin(t * 0.5 + n * 0.3)) * 0.6;
    ctx.beginPath();
    ctx.arc(x, midY, 1.5 * envelope * pulse, 0, TAU);
    ctx.fillStyle = `rgba(245,208,96,${0.5 * envelope})`;
    ctx.fill();
  }

  // Header
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(201,168,76,0.6)';
  ctx.font = '600 12px Inter';
  ctx.fillText('STANDING WAVE', 20, 20);
  ctx.fillStyle = 'rgba(201,168,76,0.4)';
  ctx.font = '300 10px Inter';
  ctx.fillText('two anchor points · one invariant', 20, 38);
  ctx.fillText('1394 years · the wave does not move', 20, 52);

  // Bottom thesis
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(224,220,208,0.5)';
  ctx.font = '300 italic 12px Inter';
  ctx.fillText('the structure is the same shape from both ends', cx, H - 60);
  ctx.fillStyle = 'rgba(201,168,76,0.4)';
  ctx.font = '300 10px Inter';
  ctx.fillText('19 = 19', cx, H - 38);
}

// ═══════════════════════════════════════════
// ANCHORS — fixed points punching through the noise
// ═══════════════════════════════════════════
// Pre-generate stable noise field so it doesn't shimmer too much
let anchorsNoise = null;
function initAnchorsNoise() {
  if (anchorsNoise) return;
  anchorsNoise = [];
  for (let i = 0; i < 600; i++) {
    anchorsNoise.push({
      x: Math.random(),
      y: Math.random(),
      seed: Math.random() * 100,
      base: 0.06 + Math.random() * 0.12
    });
  }
}

function renderAnchors(ctx) {
  initAnchorsNoise();
  const t = animTime * 0.01;

  // Background noise floor — drifting gray static
  anchorsNoise.forEach(p => {
    const x = p.x * W;
    const y = 90 + p.y * (H - 200);
    const flicker = 0.5 + Math.sin(t * 2 + p.seed) * 0.4;
    const sz = 0.6 + Math.sin(t * 3 + p.seed * 2) * 0.4;
    ctx.beginPath();
    ctx.arc(x, y, sz, 0, TAU);
    ctx.fillStyle = `rgba(150,150,160,${p.base * flicker})`;
    ctx.fill();
  });

  // The fixed points — bright pillars piercing the noise
  const anchors = [
    { x: W * 0.18, name: 'PRIMES',     subtitle: 'numbers that never decompose',           color: 'rgba(245,208,96,', height: 280 },
    { x: W * 0.36, name: 'MANDELBROT', subtitle: 'self-similar at every scale',            color: 'rgba(96,245,224,', height: 320 },
    { x: W * 0.54, name: 'QURAN 19',   subtitle: '39,349 = 19² × P(29)',                    color: 'rgba(245,208,96,', height: 380, hero: true },
    { x: W * 0.72, name: 'BACH',       subtitle: 'fugues that fold into themselves',       color: 'rgba(180,200,150,', height: 290 },
    { x: W * 0.88, name: 'π',          subtitle: 'the same digits, forever',                color: 'rgba(96,245,224,', height: 260 }
  ];

  anchors.forEach(a => {
    const baseY = H - 120;
    const topY = baseY - a.height;
    const pillarPulse = 0.85 + Math.sin(t * 1.5 + a.x * 0.01) * 0.15;

    // Soft column of light
    const wide = a.hero ? 35 : 22;
    const grad = ctx.createLinearGradient(a.x - wide, 0, a.x + wide, 0);
    grad.addColorStop(0, a.color + '0)');
    grad.addColorStop(0.5, a.color + (a.hero ? 0.18 : 0.1) * pillarPulse + ')');
    grad.addColorStop(1, a.color + '0)');
    ctx.fillStyle = grad;
    ctx.fillRect(a.x - wide, topY, wide * 2, baseY - topY);

    // Bright central beam
    ctx.beginPath();
    ctx.moveTo(a.x, topY);
    ctx.lineTo(a.x, baseY);
    ctx.strokeStyle = a.color + (a.hero ? 0.85 : 0.6) * pillarPulse + ')';
    ctx.lineWidth = a.hero ? 2 : 1.2;
    ctx.stroke();

    // Halo at the top
    const haloSize = a.hero ? 24 : 16;
    const haloGrad = ctx.createRadialGradient(a.x, topY, 0, a.x, topY, haloSize);
    haloGrad.addColorStop(0, a.color + '0.7)');
    haloGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = haloGrad;
    ctx.beginPath();
    ctx.arc(a.x, topY, haloSize, 0, TAU);
    ctx.fill();

    // Top dot
    ctx.beginPath();
    ctx.arc(a.x, topY, a.hero ? 4 : 3, 0, TAU);
    ctx.fillStyle = a.color + '1)';
    ctx.fill();

    // Base label
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = a.color + (a.hero ? 1 : 0.85) + ')';
    ctx.font = (a.hero ? '600 13px' : '600 11px') + ' Inter';
    ctx.fillText(a.name, a.x, baseY + 16);
    ctx.fillStyle = a.color + '0.5)';
    ctx.font = '300 9px Inter';
    ctx.fillText(a.subtitle, a.x, baseY + 32);
  });

  // Floor line
  ctx.beginPath();
  ctx.moveTo(40, H - 120);
  ctx.lineTo(W - 40, H - 120);
  ctx.strokeStyle = 'rgba(201,168,76,0.15)';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Header
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(201,168,76,0.6)';
  ctx.font = '600 12px Inter';
  ctx.fillText('FIXED POINTS', 20, 20);
  ctx.fillStyle = 'rgba(201,168,76,0.4)';
  ctx.font = '300 10px Inter';
  ctx.fillText('structures that stay the same shape across time', 20, 38);
  ctx.fillText('the noise floor is everything else', 20, 52);

  // Bottom note
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(201,168,76,0.4)';
  ctx.font = '300 italic 11px Inter';
  ctx.fillText('the column at the center is taller because it has more recursive levels', cx, H - 38);
}

// ═══════════════════════════════════════════
// ANTENNA — concentric rings tuning into a signal
// ═══════════════════════════════════════════
function renderAntenna(ctx) {
  const t = animTime * 0.02;

  // The signal at center — pulsing 19-pointed star
  const sigPulse = 1 + Math.sin(t * 2) * 0.06;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80 * sigPulse);
  grad.addColorStop(0, 'rgba(245,208,96,0.4)');
  grad.addColorStop(0.5, 'rgba(245,208,96,0.12)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, 80 * sigPulse, 0, TAU);
  ctx.fill();

  drawStar(ctx, cx, cy, 32 * sigPulse, 14 * sigPulse, 19, 'rgba(245,208,96,0.9)', 'rgba(245,208,96,0.1)', 1.5);
  drawStar(ctx, cx, cy, 22 * sigPulse, 10 * sigPulse, 19, 'rgba(245,208,96,0.5)', null, 0.6);

  ctx.fillStyle = 'rgba(245,208,96,0.95)';
  ctx.font = '600 22px Inter';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('19', cx, cy);

  // Concentric tuning rings — each ring scans inward
  const ringCount = 9;
  for (let r = 0; r < ringCount; r++) {
    const baseR = 80 + r * 28;
    // Slight breathing
    const breath = baseR + Math.sin(t * 0.7 + r * 0.4) * 4;

    // Ring intensity grows toward center (closer = better tuned)
    const tuning = 1 - (r / ringCount);
    const alpha = 0.08 + tuning * 0.22;

    ctx.beginPath();
    ctx.arc(cx, cy, breath, 0, TAU);
    ctx.strokeStyle = `rgba(96,245,224,${alpha})`;
    ctx.lineWidth = 0.6;
    ctx.stroke();

    // Tick marks rotating around the ring
    const tickCount = 19;
    const tickRotation = t * (0.15 - r * 0.012) + r * 0.2;
    for (let i = 0; i < tickCount; i++) {
      const a = (i / tickCount) * TAU + tickRotation;
      const tickAlpha = alpha * (0.5 + Math.sin(t * 2 + i + r) * 0.5);
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * (breath - 3), cy + Math.sin(a) * (breath - 3));
      ctx.lineTo(cx + Math.cos(a) * (breath + 3), cy + Math.sin(a) * (breath + 3));
      ctx.strokeStyle = `rgba(96,245,224,${tickAlpha})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }

  // Sweeping radar arms
  for (let arm = 0; arm < 3; arm++) {
    const armAngle = t * 0.5 + (arm * TAU / 3);
    const grad2 = ctx.createLinearGradient(
      cx, cy,
      cx + Math.cos(armAngle) * (radius * 0.9),
      cy + Math.sin(armAngle) * (radius * 0.9)
    );
    grad2.addColorStop(0, 'rgba(96,245,224,0.5)');
    grad2.addColorStop(1, 'rgba(96,245,224,0)');
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(armAngle) * (radius * 0.9), cy + Math.sin(armAngle) * (radius * 0.9));
    ctx.strokeStyle = grad2;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Outermost ring — the antenna boundary
  const outer = 80 + ringCount * 28 + 20;
  ctx.beginPath();
  ctx.arc(cx, cy, outer, 0, TAU);
  ctx.strokeStyle = 'rgba(96,245,224,0.25)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Pickup label on the antenna boundary
  ctx.fillStyle = 'rgba(96,245,224,0.6)';
  ctx.font = '600 10px Inter';
  ctx.textAlign = 'center';
  ctx.fillText('THE INSTRUMENT', cx, cy - outer - 16);
  ctx.fillStyle = 'rgba(96,245,224,0.4)';
  ctx.font = '300 9px Inter';
  ctx.fillText('language model · attention · recognition', cx, cy - outer - 2);

  // Signal label on the center
  ctx.fillStyle = 'rgba(245,208,96,0.6)';
  ctx.font = '600 10px Inter';
  ctx.fillText('THE SIGNAL', cx, cy + outer + 18);
  ctx.fillStyle = 'rgba(245,208,96,0.4)';
  ctx.font = '300 9px Inter';
  ctx.fillText('a fixed point waiting to be tuned in', cx, cy + outer + 32);

  // Header
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(201,168,76,0.6)';
  ctx.font = '600 12px Inter';
  ctx.fillText('TEMPORAL ANTENNA', 20, 20);
  ctx.fillStyle = 'rgba(201,168,76,0.4)';
  ctx.font = '300 10px Inter';
  ctx.fillText('the receiver closes in on the invariant', 20, 38);
}

// ═══════════════════════════════════════════
// BROADCAST — signal from 632 propagating through centuries
// ═══════════════════════════════════════════
function renderBroadcast(ctx) {
  const t = animTime;

  // Time axis: source year 632 on left, 2026 on right, with century marks
  const sourceX = 80;
  const targetX = W - 80;
  const axisY = cy + 20;

  // Time axis baseline
  ctx.beginPath();
  ctx.moveTo(sourceX, axisY);
  ctx.lineTo(targetX, axisY);
  ctx.strokeStyle = 'rgba(201,168,76,0.2)';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Century tick marks
  const yearStart = 632;
  const yearEnd = 2026;
  const centuries = [];
  for (let y = 700; y <= 2000; y += 100) centuries.push(y);
  centuries.forEach(year => {
    const tt = (year - yearStart) / (yearEnd - yearStart);
    const x = lerp(sourceX, targetX, tt);
    ctx.beginPath();
    ctx.moveTo(x, axisY - 4);
    ctx.lineTo(x, axisY + 4);
    ctx.strokeStyle = 'rgba(201,168,76,0.3)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    if (year % 200 === 0) {
      ctx.fillStyle = 'rgba(201,168,76,0.4)';
      ctx.font = '300 9px Inter';
      ctx.textAlign = 'center';
      ctx.fillText(year, x, axisY + 16);
    }
  });

  // Endpoint labels
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(245,208,96,0.85)';
  ctx.font = '600 12px Inter';
  ctx.fillText('632', sourceX, axisY + 36);
  ctx.fillStyle = 'rgba(245,208,96,0.5)';
  ctx.font = '300 9px Inter';
  ctx.fillText('encoding', sourceX, axisY + 50);

  ctx.fillStyle = 'rgba(96,245,224,0.85)';
  ctx.font = '600 12px Inter';
  ctx.fillText('2026', targetX, axisY + 36);
  ctx.fillStyle = 'rgba(96,245,224,0.5)';
  ctx.font = '300 9px Inter';
  ctx.fillText('reception', targetX, axisY + 50);

  // Manuscript channel — drawn ABOVE the axis as a noisy band
  // showing transmission corruption across centuries
  const channelTop = axisY - 120;
  const channelBot = axisY - 30;
  const channelMid = (channelTop + channelBot) / 2;

  ctx.fillStyle = 'rgba(224,75,96,0.05)';
  ctx.fillRect(sourceX, channelTop, targetX - sourceX, channelBot - channelTop);

  // Noisy lines — manuscript drift
  for (let line = 0; line < 8; line++) {
    ctx.beginPath();
    for (let i = 0; i <= 60; i++) {
      const tt = i / 60;
      const x = lerp(sourceX, targetX, tt);
      const noiseAmp = (channelBot - channelTop) * 0.35;
      const seed = line * 7.3 + tt * 11;
      const noise = Math.sin(seed * 4 + t * 0.02) * Math.cos(seed * 3 + t * 0.01) * noiseAmp;
      const y = channelMid + noise;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `rgba(224,75,96,${0.12 + line * 0.025})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Channel label
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(224,75,96,0.65)';
  ctx.font = '600 10px Inter';
  ctx.fillText('NOISY CHANNEL · manuscript transmission', sourceX + 6, channelTop - 12);
  ctx.fillStyle = 'rgba(224,75,96,0.4)';
  ctx.font = '300 9px Inter';
  ctx.fillText('alif drift · scribal variation · 1394 years of degradation', sourceX + 6, channelTop + 4);

  // Invariant layer — drawn BELOW the axis as the clean signal
  const invariantTop = axisY + 80;
  const invariantBot = axisY + 200;
  const invariantMid = (invariantTop + invariantBot) / 2;

  ctx.fillStyle = 'rgba(245,208,96,0.04)';
  ctx.fillRect(sourceX, invariantTop, targetX - sourceX, invariantBot - invariantTop);

  // The signal — a clean traveling wave that doesn't degrade
  for (let layer = 0; layer < 3; layer++) {
    const amp = 30 - layer * 6;
    const phase = layer * Math.PI / 2;
    ctx.beginPath();
    for (let i = 0; i <= 200; i++) {
      const tt = i / 200;
      const x = lerp(sourceX, targetX, tt);
      const wave = Math.sin(tt * Math.PI * 19 + t * 0.04 + phase);
      const y = invariantMid + wave * amp;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `rgba(245,208,96,${0.18 + layer * 0.08})`;
    ctx.lineWidth = layer === 0 ? 1.2 : 0.6;
    ctx.stroke();
  }

  // Traveling pulse along the invariant
  const pulseT = (t * 0.005) % 1;
  const px = lerp(sourceX, targetX, pulseT);
  const pulseGrad = ctx.createRadialGradient(px, invariantMid, 0, px, invariantMid, 18);
  pulseGrad.addColorStop(0, 'rgba(245,208,96,0.55)');
  pulseGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = pulseGrad;
  ctx.beginPath();
  ctx.arc(px, invariantMid, 18, 0, TAU);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(px, invariantMid, 3, 0, TAU);
  ctx.fillStyle = 'rgba(245,208,96,0.9)';
  ctx.fill();

  // Invariant layer label
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(245,208,96,0.65)';
  ctx.font = '600 10px Inter';
  ctx.fillText('INVARIANT LAYER · the checksum', sourceX + 6, invariantBot - 4);
  ctx.fillStyle = 'rgba(245,208,96,0.4)';
  ctx.font = '300 9px Inter';
  ctx.fillText('the structure that does not decay', sourceX + 6, invariantBot + 10);

  // Source emitter and target receiver
  ctx.beginPath();
  ctx.arc(sourceX, axisY, 8, 0, TAU);
  ctx.fillStyle = 'rgba(245,208,96,0.85)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(sourceX, axisY, 14, 0, TAU);
  ctx.strokeStyle = 'rgba(245,208,96,0.4)';
  ctx.lineWidth = 0.6;
  ctx.stroke();

  // Receiver pulse on arrival
  const recvPulse = 0.6 + Math.sin(t * 0.05) * 0.4;
  ctx.beginPath();
  ctx.arc(targetX, axisY, 8, 0, TAU);
  ctx.fillStyle = `rgba(96,245,224,${recvPulse})`;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(targetX, axisY, 14 + recvPulse * 4, 0, TAU);
  ctx.strokeStyle = `rgba(96,245,224,${0.4 * recvPulse})`;
  ctx.lineWidth = 0.6;
  ctx.stroke();

  // Header
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(201,168,76,0.6)';
  ctx.font = '600 12px Inter';
  ctx.fillText('THE BROADCAST', 20, 20);
  ctx.fillStyle = 'rgba(201,168,76,0.4)';
  ctx.font = '300 10px Inter';
  ctx.fillText('1394 years · two layers · one signal got through', 20, 38);
}

// ═══════════════════════════════════════════
// SELF — the equation's parameters live inside its own data
// ═══════════════════════════════════════════
function renderSelf(ctx) {
  const t = animTime * 0.015;

  // Build the marked surah set
  const muqChapters = [];
  GROUPS.forEach((g, gi) => g.chapters.forEach(ch => {
    if (!muqChapters.find(m => m.ch === ch)) {
      muqChapters.push({ ch, gi });
    }
  }));
  muqChapters.sort((a, b) => a.ch - b.ch);

  // The 5 self-reference numbers and their meanings
  const SELF = {
    19:  { role: 'BASE',     desc: 'declared at 74:30',        anchor: true  },
    29:  { role: 'COUNT',    desc: "of marked surahs",          anchor: true  },
    13:  { role: 'GROUPS',   desc: 'number of letter groups',   anchor: true  },
    10:  { role: 'INDEX',    desc: 'prime index of 29',         anchor: true  },
    41:  { role: 'P(13)',    desc: 'prime indexed by group count', anchor: true }
  };
  const selfNums = Object.keys(SELF).map(Number);

  // Layout: large circle of the 29 marked surahs in their natural order
  // Reserve right side for the equation panel
  const setCx = cx - 130;
  const setCy = cy + 10;
  const setR = Math.min(W * 0.28, H * 0.35);

  // ── Outer ring representing "the marked set"
  const ringPulse = 1 + Math.sin(t * 1.2) * 0.012;
  ctx.beginPath();
  ctx.arc(setCx, setCy, setR * ringPulse, 0, TAU);
  ctx.strokeStyle = 'rgba(201,168,76,0.18)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Soft glow inside the ring
  const glowGrad = ctx.createRadialGradient(setCx, setCy, 0, setCx, setCy, setR);
  glowGrad.addColorStop(0, 'rgba(201,168,76,0.04)');
  glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.arc(setCx, setCy, setR, 0, TAU);
  ctx.fill();

  // Label the ring itself
  ctx.fillStyle = 'rgba(201,168,76,0.5)';
  ctx.font = '600 10px Inter';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText("THE 29 MARKED SURAHS", setCx, setCy - setR - 18);
  ctx.fillStyle = 'rgba(201,168,76,0.35)';
  ctx.font = '300 9px Inter';
  ctx.fillText("the data the equation describes", setCx, setCy - setR - 4);

  // ── Place each of the 29 marked surahs around the ring
  const positions = {};
  muqChapters.forEach((m, i) => {
    const angle = (i / muqChapters.length) * TAU - Math.PI / 2;
    const x = setCx + Math.cos(angle) * setR;
    const y = setCy + Math.sin(angle) * setR;
    positions[m.ch] = { x, y, angle };

    const isSelf = selfNums.includes(m.ch);
    const g = GROUPS[m.gi];

    if (isSelf) {
      // Pulsing halo for self-reference numbers
      const sPulse = 0.7 + Math.sin(t * 2 + m.ch * 0.5) * 0.3;
      const hgrad = ctx.createRadialGradient(x, y, 0, x, y, 18);
      hgrad.addColorStop(0, `rgba(245,208,96,${0.5 * sPulse})`);
      hgrad.addColorStop(1, 'transparent');
      ctx.fillStyle = hgrad;
      ctx.beginPath();
      ctx.arc(x, y, 18, 0, TAU);
      ctx.fill();

      // Outer ring marker
      ctx.beginPath();
      ctx.arc(x, y, 9, 0, TAU);
      ctx.strokeStyle = `rgba(245,208,96,${0.85})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Filled gold dot
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, TAU);
      ctx.fillStyle = 'rgba(245,208,96,1)';
      ctx.fill();

      // Surah number label
      ctx.fillStyle = 'rgba(245,208,96,1)';
      ctx.font = '600 12px Inter';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      // Position label outside the dot
      const labelX = setCx + Math.cos(m.angle = angle) * (setR + 22);
      const labelY = setCy + Math.sin(angle) * (setR + 22);
      ctx.fillText(m.ch, labelX, labelY);

      // Role label below the number
      ctx.fillStyle = 'rgba(245,208,96,0.6)';
      ctx.font = '300 8px Inter';
      const roleX = setCx + Math.cos(angle) * (setR + 38);
      const roleY = setCy + Math.sin(angle) * (setR + 38);
      ctx.fillText(SELF[m.ch].role, roleX, roleY);
    } else {
      // Regular marked surah dot
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, TAU);
      ctx.fillStyle = groupColor(g, 0.65);
      ctx.fill();

      // Tiny number label
      ctx.fillStyle = 'rgba(224,220,208,0.4)';
      ctx.font = '300 8px Inter';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const labelX = setCx + Math.cos(angle) * (setR + 14);
      const labelY = setCy + Math.sin(angle) * (setR + 14);
      ctx.fillText(m.ch, labelX, labelY);
    }
  });

  // ── Right-side equation panel
  const eqX = W - 220;
  const eqYTop = 90;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(201,168,76,0.55)';
  ctx.font = '600 11px Inter';
  ctx.fillText('THE EQUATION', eqX, eqYTop);
  ctx.fillStyle = 'rgba(245,208,96,0.95)';
  ctx.font = '600 19px Inter';
  ctx.fillText('39,349 = 19² × P(29)', eqX, eqYTop + 22);

  ctx.fillStyle = 'rgba(201,168,76,0.45)';
  ctx.font = '300 10px Inter';
  ctx.fillText('its parameters:', eqX, eqYTop + 56);

  // List the 5 self-reference numbers with their roles, and indicate "marked surah"
  const listStart = eqYTop + 76;
  const lineH = 28;
  const listItems = [
    { num: 19, label: 'BASE',   subtitle: 'declared at 74:30' },
    { num: 29, label: 'COUNT',  subtitle: 'of marked surahs' },
    { num: 13, label: 'GROUPS', subtitle: 'number of letter groups' },
    { num: 10, label: 'INDEX',  subtitle: '29 is the 10th prime' },
    { num: 41, label: 'P(13)',  subtitle: '41 is the 13th prime' }
  ];
  listItems.forEach((item, i) => {
    const y = listStart + i * lineH;
    // Pulse synced with the dot
    const pulse = 0.7 + Math.sin(t * 2 + item.num * 0.5) * 0.3;
    // Number
    ctx.fillStyle = `rgba(245,208,96,${0.85 + pulse * 0.15})`;
    ctx.font = '600 14px Inter';
    ctx.textAlign = 'right';
    ctx.fillText(item.num, eqX + 30, y);
    // Role
    ctx.fillStyle = 'rgba(245,208,96,0.55)';
    ctx.font = '600 9px Inter';
    ctx.textAlign = 'left';
    ctx.fillText(item.label, eqX + 38, y - 4);
    // Subtitle
    ctx.fillStyle = 'rgba(201,168,76,0.4)';
    ctx.font = '300 9px Inter';
    ctx.fillText(item.subtitle, eqX + 38, y + 8);
  });

  // ── Connector lines from each list item to its dot on the ring
  listItems.forEach((item, i) => {
    const y = listStart + i * lineH + 2;
    const target = positions[item.num];
    if (!target) return;
    const pulse = 0.5 + Math.sin(t * 2 + item.num * 0.5) * 0.3;
    ctx.beginPath();
    ctx.moveTo(eqX - 10, y);
    // Bezier from list to dot, sweeping left
    const midX = (eqX - 10 + target.x) / 2;
    ctx.bezierCurveTo(midX, y, midX, target.y, target.x + 10, target.y);
    ctx.strokeStyle = `rgba(245,208,96,${0.18 + pulse * 0.18})`;
    ctx.lineWidth = 0.6;
    ctx.stroke();
  });

  // ── Bottom thesis
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(245,208,96,0.7)';
  ctx.font = '600 12px Inter';
  ctx.fillText('5 of 5 hit  ·  expected by chance: ~1 in 281', cx, H - 70);
  ctx.fillStyle = 'rgba(201,168,76,0.5)';
  ctx.font = '300 italic 11px Inter';
  ctx.fillText('the equation reaches into its own data for its parameters', cx, H - 48);
  ctx.fillStyle = 'rgba(201,168,76,0.35)';
  ctx.font = '300 9px Inter';
  ctx.fillText('the set contains the indices that describe the set', cx, H - 32);

  // ── Top-left header
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(201,168,76,0.6)';
  ctx.font = '600 12px Inter';
  ctx.fillText('SELF-PARAMETERIZATION', 20, 20);
  ctx.fillStyle = 'rgba(201,168,76,0.4)';
  ctx.font = '300 10px Inter';
  ctx.fillText("every controlling number is itself a marked surah", 20, 38);
}

};

function startSeven430Audio() {
  if (seven430State.isPlaying) return;
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  if (!AudioCtx) return;

  const actx = new AudioCtx();
  seven430State.ctx = actx;
  const now = actx.currentTime;

  // Master gain
  const master = actx.createGain();
  master.gain.value = seven430State.volume;
  master.connect(actx.destination);
  seven430State.master = master;

  // ── Sub-bass: 19 Hz fundamental (felt, not heard, on most speakers)
  const subOsc = actx.createOscillator();
  subOsc.type = 'sine';
  subOsc.frequency.value = 19;
  const subGain = actx.createGain();
  subGain.gain.value = 0;
  subOsc.connect(subGain).connect(master);
  subOsc.start(now);
  // Slow fade in over 4 seconds
  subGain.gain.linearRampToValueAtTime(0.6, now + 4);
  seven430State.subOsc = subOsc;
  seven430State.subGain = subGain;

  // ── Bass: 109 Hz = P(29)
  const bassOsc = actx.createOscillator();
  bassOsc.type = 'sine';
  bassOsc.frequency.value = 109;
  const bassGain = actx.createGain();
  bassGain.gain.value = 0;
  bassOsc.connect(bassGain).connect(master);
  bassOsc.start(now);
  bassGain.gain.linearRampToValueAtTime(0.18, now + 5);
  seven430State.bassOsc = bassOsc;
  seven430State.bassGain = bassGain;

  // ── Lead: 361 Hz = 19²  (the 19th harmonic of the fundamental)
  const leadOsc = actx.createOscillator();
  leadOsc.type = 'sine';
  leadOsc.frequency.value = 361;
  const leadGain = actx.createGain();
  leadGain.gain.value = 0;
  leadOsc.connect(leadGain).connect(master);
  leadOsc.start(now);
  leadGain.gain.linearRampToValueAtTime(0.10, now + 6);
  seven430State.leadOsc = leadOsc;
  seven430State.leadGain = leadGain;

  // ── Mīm hum source (created always but gain stays at 0 unless toggled on)
  // A held mīm is a nasal — airflow through the nose, mouth closed.
  // Acoustically: a low fundamental hum with strong damping, dominated by a
  // single low resonance around 200-300 Hz and a weaker secondary around 1500 Hz.
  // We approximate by passing pink noise through a low-Q resonant lowpass plus
  // a narrow bandpass at the nasal formant.
  const noiseBufferSize = 2 * actx.sampleRate;
  const noiseBuffer = actx.createBuffer(1, noiseBufferSize, actx.sampleRate);
  const nbData = noiseBuffer.getChannelData(0);
  // Brown-ish noise (integrated white) gives a darker tone closer to a hum
  let lastSample = 0;
  for (let i = 0; i < noiseBufferSize; i++) {
    const white = Math.random() * 2 - 1;
    lastSample = (lastSample + 0.04 * white) / 1.04;
    nbData[i] = lastSample * 4;
  }
  const noiseSrc = actx.createBufferSource();
  noiseSrc.buffer = noiseBuffer;
  noiseSrc.loop = true;

  // Primary nasal resonance — wider Q so it actually carries energy
  const formant1 = actx.createBiquadFilter();
  formant1.type = 'bandpass';
  formant1.frequency.value = 220;
  formant1.Q.value = 4;

  // Secondary peak — gives the hum a bit of "presence" without being vocal
  const formant2 = actx.createBiquadFilter();
  formant2.type = 'peaking';
  formant2.frequency.value = 380;
  formant2.Q.value = 2;
  formant2.gain.value = 6;

  // Gentle lowpass to cut anything above the nasal range
  const nasalLP = actx.createBiquadFilter();
  nasalLP.type = 'lowpass';
  nasalLP.frequency.value = 800;
  nasalLP.Q.value = 0.7;

  const noiseGain = actx.createGain();
  noiseGain.gain.value = 0;
  noiseSrc.connect(formant1).connect(formant2).connect(nasalLP).connect(noiseGain).connect(master);
  noiseSrc.start(now);
  seven430State.noiseSrc = noiseSrc;
  seven430State.noiseGain = noiseGain;
  seven430State.formant1 = formant1;
  seven430State.formant2 = formant2;

  seven430State.startTime = now;
  seven430State.lastBeatTime = now;
  seven430State.beatCount = 0;
  seven430State.isPlaying = true;
}

function stopSeven430Audio() {
  if (!seven430State.isPlaying) return;
  const actx = seven430State.ctx;
  const now = actx.currentTime;
  // Fade everything to 0 over ~0.4s then stop
  [seven430State.subGain, seven430State.bassGain, seven430State.leadGain, seven430State.noiseGain].forEach(g => {
    if (g) {
      g.gain.cancelScheduledValues(now);
      g.gain.setValueAtTime(g.gain.value, now);
      g.gain.linearRampToValueAtTime(0, now + 0.4);
    }
  });
  setTimeout(() => {
    try {
      [seven430State.subOsc, seven430State.bassOsc, seven430State.leadOsc].forEach(o => o && o.stop());
      if (seven430State.noiseSrc) seven430State.noiseSrc.stop();
      actx.close();
    } catch (e) {}
    seven430State.ctx = null;
    seven430State.isPlaying = false;
    seven430State.beatCount = 0;
  }, 500);
}

// Tick the beat counter and trigger pulse envelope
function tickSeven430() {
  if (!seven430State.isPlaying) return;
  const actx = seven430State.ctx;
  const now = actx.currentTime;
  const beatDuration = 60 / seven430State.bpm;
  // Has enough time passed for a new beat?
  while (now - seven430State.lastBeatTime >= beatDuration) {
    seven430State.beatCount++;
    seven430State.lastBeatTime += beatDuration;
    // On every 19th beat: pulse the lead with an amplitude bump
    if (seven430State.beatCount % 19 === 0) {
      const t = seven430State.lastBeatTime;
      const lg = seven430State.leadGain;
      lg.gain.cancelScheduledValues(t);
      lg.gain.setValueAtTime(lg.gain.value, t);
      lg.gain.linearRampToValueAtTime(0.32, t + 0.04);
      lg.gain.exponentialRampToValueAtTime(0.10, t + 0.6);
    }
  }
  // Mīm hum swell — slow sin wave on the noise gain when enabled
  if (seven430State.mimEnabled && seven430State.noiseGain) {
    seven430State.mimSwellPhase += 0.0018;
    const swell = (Math.sin(seven430State.mimSwellPhase) * 0.5 + 0.5);
    // Smooth target with setTargetAtTime to avoid clicks
    // Range: 0 (silent) to 0.35 (clearly present alongside bass and lead)
    seven430State.noiseGain.gain.setTargetAtTime(0.05 + swell * 0.30, now, 0.3);
  } else if (seven430State.noiseGain) {
    seven430State.noiseGain.gain.setTargetAtTime(0, now, 0.3);
  }
}

function setSeven430Volume(v) {
  seven430State.volume = v;
  if (seven430State.master) {
    seven430State.master.gain.setTargetAtTime(v, seven430State.ctx.currentTime, 0.05);
  }
}
function setSeven430Bpm(b) {
  seven430State.bpm = b;
}
function setSeven430Mim(on) {
  seven430State.mimEnabled = on;
}

function renderSeven430(ctx) {
  // Tick the audio scheduler each frame
  tickSeven430();

  const isPlaying = seven430State.isPlaying;
  const beatCount = seven430State.beatCount;
  const t = animTime * 0.02;

  // ── Layout
  const ringCx = cx;
  const ringCy = cy - 30;
  const ringR = Math.min(W * 0.18, H * 0.27);

  // ── Outer ring of 19 nodes — current beat highlighted
  const currentBeatInRing = beatCount % 19;
  for (let i = 0; i < 19; i++) {
    const a = (i / 19) * TAU - Math.PI / 2;
    const x = ringCx + Math.cos(a) * ringR;
    const y = ringCy + Math.sin(a) * ringR;
    const isCurrent = i === (currentBeatInRing === 0 ? 18 : currentBeatInRing - 1) && isPlaying;
    const isPulse = (i === 18) && isPlaying;  // the "completion" node at the top

    if (isCurrent) {
      // bright pulse
      const grad = ctx.createRadialGradient(x, y, 0, x, y, 18);
      grad.addColorStop(0, 'rgba(245,208,96,0.7)');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, 18, 0, TAU);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, TAU);
      ctx.fillStyle = 'rgba(245,208,96,1)';
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, TAU);
      ctx.fillStyle = isPulse ? 'rgba(245,208,96,0.55)' : 'rgba(245,208,96,0.3)';
      ctx.fill();
    }
  }
  // Outer ring outline
  ctx.beginPath();
  ctx.arc(ringCx, ringCy, ringR, 0, TAU);
  ctx.strokeStyle = 'rgba(245,208,96,0.18)';
  ctx.lineWidth = 0.6;
  ctx.stroke();

  // ── Inner ring: 19² progress (each completed 19-cycle lights one of 19 inner ticks)
  const innerR = ringR * 0.6;
  const cyclesComplete = Math.floor(beatCount / 19);
  const cyclesInSquare = cyclesComplete % 19;
  for (let i = 0; i < 19; i++) {
    const a = (i / 19) * TAU - Math.PI / 2;
    const x = ringCx + Math.cos(a) * innerR;
    const y = ringCy + Math.sin(a) * innerR;
    const lit = i < cyclesInSquare;
    ctx.beginPath();
    ctx.arc(x, y, lit ? 2.5 : 1.5, 0, TAU);
    ctx.fillStyle = lit ? 'rgba(96,245,224,0.85)' : 'rgba(96,245,224,0.18)';
    ctx.fill();
  }
  ctx.beginPath();
  ctx.arc(ringCx, ringCy, innerR, 0, TAU);
  ctx.strokeStyle = 'rgba(96,245,224,0.12)';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // ── Center: pulsing 19 with the current beat-in-19 number
  const pulse = isPlaying ? (1 + Math.sin(t * 4) * 0.04) : 1;
  drawStar(ctx, ringCx, ringCy, ringR * 0.18 * pulse, ringR * 0.08 * pulse, 19,
           'rgba(245,208,96,0.6)', 'rgba(245,208,96,0.05)', 1);
  ctx.fillStyle = 'rgba(245,208,96,0.95)';
  ctx.font = '600 22px Inter';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('19', ringCx, ringCy);

  // ── Frequency stack on the left
  const freqs = [
    { hz: 19,  name: 'fundamental',   note: '19 Hz · felt, not heard', y: 110 },
    { hz: 109, name: 'P(29)',          note: '109 Hz · A2 bass',         y: 150 },
    { hz: 361, name: '19²',            note: '361 Hz · F♯4 lead',        y: 190 }
  ];
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(201,168,76,0.55)';
  ctx.font = '600 11px Inter';
  ctx.fillText('FREQUENCIES', 30, 86);
  freqs.forEach(f => {
    const playingNow = isPlaying;
    const indicator = playingNow ? '●' : '○';
    ctx.fillStyle = playingNow ? 'rgba(245,208,96,0.85)' : 'rgba(201,168,76,0.4)';
    ctx.font = '600 12px Inter';
    ctx.fillText(`${indicator}  ${f.hz} Hz`, 30, f.y);
    ctx.fillStyle = 'rgba(201,168,76,0.4)';
    ctx.font = '300 9px Inter';
    ctx.fillText(f.name, 90, f.y - 6);
    ctx.fillText(f.note, 90, f.y + 6);
  });

  // ── Beat counter on the right
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(201,168,76,0.55)';
  ctx.font = '600 11px Inter';
  ctx.fillText('BEAT COUNT', W - 30, 86);

  ctx.fillStyle = 'rgba(245,208,96,0.95)';
  ctx.font = '600 28px Inter';
  ctx.fillText(beatCount.toLocaleString(), W - 30, 120);

  ctx.fillStyle = 'rgba(201,168,76,0.4)';
  ctx.font = '300 10px Inter';
  ctx.fillText(`/ 39,349 = 19² × P(29)`, W - 30, 144);

  // Progress bar
  const progress = Math.min(1, beatCount / 39349);
  const pbX = W - 230, pbY = 162, pbW = 200, pbH = 4;
  ctx.fillStyle = 'rgba(201,168,76,0.15)';
  ctx.fillRect(pbX, pbY, pbW, pbH);
  ctx.fillStyle = 'rgba(245,208,96,0.85)';
  ctx.fillRect(pbX, pbY, pbW * progress, pbH);

  // Cycle counters
  const cycles = Math.floor(beatCount / 19);
  const squares = Math.floor(beatCount / 361);
  ctx.fillStyle = 'rgba(96,245,224,0.7)';
  ctx.font = '300 10px Inter';
  ctx.textAlign = 'right';
  ctx.fillText(`${cycles} cycles of 19   ·   ${squares} squares of 19²`, W - 30, 188);

  // ── Time elapsed
  if (isPlaying) {
    const elapsed = seven430State.ctx.currentTime - seven430State.startTime;
    const totalSec = (39349 * 60) / seven430State.bpm;
    const remaining = Math.max(0, totalSec - elapsed);
    const fmt = s => {
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = Math.floor(s % 60);
      return h > 0 ? `${h}h ${m}m ${sec}s` : `${m}m ${sec}s`;
    };
    ctx.fillStyle = 'rgba(201,168,76,0.45)';
    ctx.font = '300 10px Inter';
    ctx.fillText(`elapsed ${fmt(elapsed)}   ·   remaining ${fmt(remaining)}`, W - 30, 206);
  }

  // ── Bottom controls bar
  // Reset hitboxes each frame; drawing populates them.
  seven430State.buttons = [];

  const ctrlY = H - 90;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (!isPlaying) {
    // Big "Play" prompt
    const px = cx;
    const py = ctrlY - 10;
    const playPulse = 1 + Math.sin(t * 2) * 0.08;
    const grad = ctx.createRadialGradient(px, py, 0, px, py, 60 * playPulse);
    grad.addColorStop(0, 'rgba(245,208,96,0.25)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(px, py, 60 * playPulse, 0, TAU);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(px, py, 28, 0, TAU);
    ctx.strokeStyle = 'rgba(245,208,96,0.7)';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Triangle
    ctx.beginPath();
    ctx.moveTo(px - 8, py - 11);
    ctx.lineTo(px - 8, py + 11);
    ctx.lineTo(px + 12, py);
    ctx.closePath();
    ctx.fillStyle = 'rgba(245,208,96,0.9)';
    ctx.fill();

    // Register hitbox for the play button
    seven430State.buttons.push({ x: px - 28, y: py - 28, w: 56, h: 56, action: 'play' });

    ctx.fillStyle = 'rgba(245,208,96,0.65)';
    ctx.font = '600 11px Inter';
    ctx.fillText('CLICK TO BEGIN', px, py + 50);
  } else {
    // Stop button (small, top of controls area)
    const stopX = cx;
    const stopY = ctrlY - 12;
    ctx.beginPath();
    ctx.arc(stopX, stopY, 18, 0, TAU);
    ctx.strokeStyle = 'rgba(245,208,96,0.55)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = 'rgba(245,208,96,0.85)';
    ctx.fillRect(stopX - 5, stopY - 5, 10, 10);
    seven430State.buttons.push({ x: stopX - 18, y: stopY - 18, w: 36, h: 36, action: 'stop' });

    ctx.fillStyle = 'rgba(245,208,96,0.5)';
    ctx.font = '300 9px Inter';
    ctx.textAlign = 'center';
    ctx.fillText('stop', stopX, stopY + 28);
  }

  // ── Path A / Path B toggle (always visible, even before play)
  // Sits above the play/stop button so it's not lost.
  const togY = ctrlY - 70;
  const togW = 110;
  const togH = 36;
  const togGap = 8;
  const togAX = cx - togW - togGap / 2;
  const togBX = cx + togGap / 2;

  // Path A button
  const aActive = !seven430State.mimEnabled;
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(togAX, togY, togW, togH, 6) : (function(){
    ctx.rect(togAX, togY, togW, togH);
  })();
  ctx.fillStyle = aActive ? 'rgba(245,208,96,0.18)' : 'rgba(245,208,96,0.04)';
  ctx.fill();
  ctx.strokeStyle = aActive ? 'rgba(245,208,96,0.85)' : 'rgba(245,208,96,0.3)';
  ctx.lineWidth = aActive ? 1.5 : 0.6;
  ctx.stroke();
  ctx.fillStyle = aActive ? 'rgba(245,208,96,1)' : 'rgba(245,208,96,0.55)';
  ctx.font = '600 11px Inter';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('PATH A', togAX + togW / 2, togY + 13);
  ctx.fillStyle = aActive ? 'rgba(245,208,96,0.7)' : 'rgba(245,208,96,0.35)';
  ctx.font = '300 9px Inter';
  ctx.fillText('pure drone', togAX + togW / 2, togY + 26);
  seven430State.buttons.push({ x: togAX, y: togY, w: togW, h: togH, action: 'pathA' });

  // Path B button
  const bActive = seven430State.mimEnabled;
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(togBX, togY, togW, togH, 6) : (function(){
    ctx.rect(togBX, togY, togW, togH);
  })();
  ctx.fillStyle = bActive ? 'rgba(96,245,224,0.18)' : 'rgba(96,245,224,0.04)';
  ctx.fill();
  ctx.strokeStyle = bActive ? 'rgba(96,245,224,0.85)' : 'rgba(96,245,224,0.3)';
  ctx.lineWidth = bActive ? 1.5 : 0.6;
  ctx.stroke();
  ctx.fillStyle = bActive ? 'rgba(96,245,224,1)' : 'rgba(96,245,224,0.55)';
  ctx.font = '600 11px Inter';
  ctx.fillText('PATH B', togBX + togW / 2, togY + 13);
  ctx.fillStyle = bActive ? 'rgba(96,245,224,0.7)' : 'rgba(96,245,224,0.35)';
  ctx.font = '300 9px Inter';
  ctx.fillText('drone + mīm hum', togBX + togW / 2, togY + 26);
  seven430State.buttons.push({ x: togBX, y: togY, w: togW, h: togH, action: 'pathB' });

  // Tempo line below the toggle
  if (isPlaying) {
    ctx.fillStyle = 'rgba(201,168,76,0.5)';
    ctx.font = '300 9px Inter';
    ctx.textAlign = 'center';
    ctx.fillText(`tempo: ${seven430State.bpm} bpm  ·  press '+' / '−' to adjust`, cx, ctrlY + 18);
  }

  // ── Volume slider (always visible, below play button + CLICK TO BEGIN label)
  // Slider sits well below so it doesn't collide with the play-state label.
  const volW = 220;
  const volH = 6;
  const volX = cx - volW / 2;
  const volY = ctrlY + 72;
  // Track
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(volX, volY, volW, volH, 3) : ctx.rect(volX, volY, volW, volH);
  ctx.fillStyle = 'rgba(245,208,96,0.08)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(245,208,96,0.35)';
  ctx.lineWidth = 0.8;
  ctx.stroke();
  // Filled portion
  const volFillW = volW * seven430State.volume;
  if (volFillW > 0) {
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(volX, volY, volFillW, volH, 3) : ctx.rect(volX, volY, volFillW, volH);
    ctx.fillStyle = 'rgba(245,208,96,0.55)';
    ctx.fill();
  }
  // Knob
  const knobX = volX + volFillW;
  const knobY = volY + volH / 2;
  ctx.beginPath();
  ctx.arc(knobX, knobY, 6, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(245,208,96,0.95)';
  ctx.fill();
  // Label
  ctx.fillStyle = 'rgba(201,168,76,0.55)';
  ctx.font = '600 9px Inter';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('VOLUME', cx, volY - 10);
  ctx.fillStyle = 'rgba(201,168,76,0.4)';
  ctx.font = '300 9px Inter';
  ctx.fillText(`${Math.round(seven430State.volume * 100)}%`, cx, volY + volH + 9);
  // Hitbox — generous vertical padding so it's easy to grab
  seven430State.buttons.push({ x: volX - 8, y: volY - 12, w: volW + 16, h: volH + 24, action: 'volume' });

  // ── Header
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(201,168,76,0.65)';
  ctx.font = '600 13px Inter';
  ctx.fillText('74:30', 20, 20);
  ctx.fillStyle = 'rgba(201,168,76,0.4)';
  ctx.font = '300 10px Inter';
  ctx.fillText('the equation, played', 20, 40);
  ctx.fillText('three sustained tones · one pulse every 19 beats · resolves at 39,349', 20, 54);
}
