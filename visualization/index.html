function updateLabels() {
  const hideLabels = currentView === 'tiers' || currentView === 'primes' ||
                     currentView === 'codex' || currentView === 'keystone' ||
                     currentView === 'lattice' || currentView === 'resonance' ||
                     currentView === 'anchors' || currentView === 'antenna' ||
                     currentView === 'broadcast' || currentView === 'self' ||
                     currentView === 'seven430';
  GROUPS.forEach((g, i) => {
    const gp = groupPositions[i];
    const el = labelElements[i];
    if (hideLabels || gp.r <= 0) {
      el.setAttribute('opacity', '0');
      return;
    }
    if (currentView === 'flow') {
      el.setAttribute('x', gp.x - 40);
      el.setAttribute('y', gp.y);
      el.setAttribute('font-size', '14');
    } else if (currentView === 'galaxy') {
      el.setAttribute('x', gp.x);
      el.setAttribute('y', gp.y - gp.r - 12);
      el.setAttribute('font-size', '14');
    } else {
      const offsetY = currentView === 'constellation' ? -gp.r - 10 : 0;
      el.setAttribute('x', gp.x);
      el.setAttribute('y', gp.y + offsetY);
      el.setAttribute('font-size', Math.max(14, Math.min(26, gp.r * 0.8)));
    }
    el.setAttribute('opacity', (hoveredGroup !== null && hoveredGroup !== i && lockedGroup !== i) ? '0.3' : '1');
  });
}

// ═══════════════════════════════════════════
// INFO PANEL
// ═══════════════════════════════════════════
const infoPanel = document.getElementById('infoPanel');

function showGroupInfo(gi) {
  if (gi === null) { infoPanel.classList.remove('visible'); return; }
  const g = GROUPS[gi];
  document.getElementById('panelArabic').textContent = g.arabic;
  document.getElementById('panelLatin').textContent = g.latin + ' — Group ' + (gi+1) + ' of 13';
  document.getElementById('panelChapters').textContent = g.chapters.join(', ');
  document.getElementById('panelCount').textContent = g.count.toLocaleString();
  document.getElementById('panelDiv19').textContent = g.div19.toLocaleString();
  document.getElementById('panelProportion').textContent = (g.count / TOTAL * 100).toFixed(1) + '%';
  const tierBadge = document.getElementById('panelTier');
  tierBadge.textContent = 'Tier ' + g.tier + (g.tier === 1 ? ' — Encoding Independent' : ' — Encoding Dependent');
  tierBadge.className = 'tier-badge tier-' + g.tier;
  infoPanel.classList.add('visible');
}

// ═══════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════
function getGroupAtPoint(mx, my) {
  for (let i = 0; i < NUM_GROUPS; i++) {
    const gp = groupPositions[i];
    if (gp.r <= 0) continue;
    const dx = mx - gp.x, dy = my - gp.y;
    const hitR = Math.max(gp.r + 5, 20);
    if (dx*dx + dy*dy < hitR*hitR) return i;
  }
  return null;
}

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  // Drag the volume slider if held down in the 74:30 view
  if (seven430State.volumeDragging && currentView === 'seven430') {
    const b = seven430State.volumeDragBox;
    if (b) {
      const trackX = b.x + 8;
      const trackW = b.w - 16;
      const v = Math.max(0, Math.min(1, (mx - trackX) / trackW));
      setSeven430Volume(v);
    }
    return;
  }
  hoveredGroup = getGroupAtPoint(mx, my);
  canvas.style.cursor = hoveredGroup !== null ? 'pointer' : 'default';
  if (lockedGroup === null) showGroupInfo(hoveredGroup);
});

canvas.addEventListener('mousedown', (e) => {
  if (currentView !== 'seven430') return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  for (const b of seven430State.buttons) {
    if (b.action === 'volume' &&
        mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      seven430State.volumeDragging = true;
      seven430State.volumeDragBox = b;
      return;
    }
  }
});

window.addEventListener('mouseup', () => {
  seven430State.volumeDragging = false;
  seven430State.volumeDragBox = null;
});

canvas.addEventListener('click', (e) => {
  // 74:30 view intercepts clicks
  if (currentView === 'seven430') {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    // Check button hitboxes first
    for (const b of seven430State.buttons) {
      if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
        if (b.action === 'play') startSeven430Audio();
        else if (b.action === 'stop') stopSeven430Audio();
        else if (b.action === 'pathA') setSeven430Mim(false);
        else if (b.action === 'pathB') setSeven430Mim(true);
        else if (b.action === 'volume') {
          // Click-to-set on the slider track
          const trackX = b.x + 8;
          const trackW = b.w - 16;
          const v = Math.max(0, Math.min(1, (mx - trackX) / trackW));
          setSeven430Volume(v);
        }
        return;
      }
    }
    // Empty-space click toggles play/stop as a convenience
    if (seven430State.isPlaying) stopSeven430Audio();
    else startSeven430Audio();
    return;
  }
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const clicked = getGroupAtPoint(mx, my);
  if (clicked !== null) {
    lockedGroup = lockedGroup === clicked ? null : clicked;
    showGroupInfo(lockedGroup);
  } else {
    lockedGroup = null;
    showGroupInfo(null);
  }
});

canvas.addEventListener('mouseleave', () => {
  hoveredGroup = null;
  if (lockedGroup === null) showGroupInfo(null);
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const mx = touch.clientX - rect.left;
  const my = touch.clientY - rect.top;
  // 74:30 view: check buttons first, then play/stop on empty space
  if (currentView === 'seven430') {
    for (const b of seven430State.buttons) {
      if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
        if (b.action === 'play') startSeven430Audio();
        else if (b.action === 'stop') stopSeven430Audio();
        else if (b.action === 'pathA') setSeven430Mim(false);
        else if (b.action === 'pathB') setSeven430Mim(true);
        else if (b.action === 'volume') {
          const trackX = b.x + 8;
          const trackW = b.w - 16;
          const v = Math.max(0, Math.min(1, (mx - trackX) / trackW));
          setSeven430Volume(v);
        }
        return;
      }
    }
    if (seven430State.isPlaying) stopSeven430Audio();
    else startSeven430Audio();
    return;
  }
  const tapped = getGroupAtPoint(mx, my);
  if (tapped !== null) {
    lockedGroup = lockedGroup === tapped ? null : tapped;
    hoveredGroup = tapped;
    showGroupInfo(lockedGroup !== null ? lockedGroup : tapped);
  } else {
    lockedGroup = null;
    hoveredGroup = null;
    showGroupInfo(null);
  }
}, {passive: false});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === '1') switchView('mandala');
  else if (e.key === '2') switchView('fractal');
  else if (e.key === '3') switchView('constellation');
  else if (e.key === '4') switchView('flow');
  else if (e.key === '5') switchView('scales');
  else if (e.key === '6') switchView('galaxy');
  else if (e.key === '7') switchView('tiers');
  else if (e.key === '8') switchView('primes');
  else if (e.key === '9') switchView('codex');
  else if (e.key === '0') switchView('keystone');
  else if (e.key === 'q' || e.key === 'Q') switchView('sphere');
  else if (e.key === 'w' || e.key === 'W') switchView('helix');
  else if (e.key === 'e' || e.key === 'E') switchView('orbits');
  else if (e.key === 'r' || e.key === 'R') switchView('lattice');
  else if (e.key === 't' || e.key === 'T') switchView('timeline');
  else if (e.key === 'u' || e.key === 'U') switchView('tree');
  else if (e.key === 'o' || e.key === 'O') switchView('cosmos');
  else if (e.key === 'a' || e.key === 'A') switchView('resonance');
  else if (e.key === 's' || e.key === 'S') switchView('anchors');
  else if (e.key === 'd' || e.key === 'D') switchView('antenna');
  else if (e.key === 'f' || e.key === 'F') switchView('broadcast');
  else if (e.key === 'g' || e.key === 'G') switchView('self');
  else if (e.key === 'j' || e.key === 'J') switchView('seven430');
  // 74:30 view audio controls
  if (currentView === 'seven430') {
    if (e.key === 'm' || e.key === 'M') {
      setSeven430Mim(!seven430State.mimEnabled);
    } else if (e.key === '+' || e.key === '=') {
      setSeven430Bpm(Math.min(240, seven430State.bpm + 4));
    } else if (e.key === '-' || e.key === '_') {
      setSeven430Bpm(Math.max(20, seven430State.bpm - 4));
    } else if (e.key === ']') {
      setSeven430Volume(Math.min(1, seven430State.volume + 0.05));
    } else if (e.key === '[') {
      setSeven430Volume(Math.max(0, seven430State.volume - 0.05));
    }
  }
});

// ═══════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════
function exportPNG() {
  // Create high-res export canvas
  const scale = 2;
  const expCanvas = document.createElement('canvas');
  expCanvas.width = W * scale;
  expCanvas.height = H * scale;
  const ectx = expCanvas.getContext('2d');
  ectx.setTransform(scale, 0, 0, scale, 0, 0);

  // Draw background
  ectx.fillStyle = '#0a0a12';
  ectx.fillRect(0, 0, W, H);

  // Render current view
  const origCtx = ctx;
  renderCurrentView(ectx);

  // Render particles
  renderParticles(ectx);

  // Render Arabic labels by drawing SVG onto canvas
  const svgClone = svg.cloneNode(true);
  const svgData = new XMLSerializer().serializeToString(svgClone);
  const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(svgBlob);
  const img = new Image();
  img.onload = () => {
    ectx.drawImage(img, 0, 0, W, H);
    URL.revokeObjectURL(url);

    // Title and footer
    ectx.fillStyle = 'rgba(201,168,76,0.6)';
    ectx.font = '600 16px Inter';
    ectx.textAlign = 'left';
    ectx.fillText('7430 Project — Quran Fractal', 20, 30);
    ectx.font = '300 11px Inter';
    ectx.fillText('39,349 = 19² × P(29)', 20, H - 15);
    ectx.textAlign = 'right';
    ectx.fillText('github.com/7430project/quran-fractal', W - 20, H - 15);

    // Download
    expCanvas.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `7430-fractal-${currentView}.png`;
      a.click();
      URL.revokeObjectURL(a.href);
    }, 'image/png');
  };
  img.src = url;
}

function renderCurrentView(c) {
  if (currentView === 'mandala') renderMandala(c);
  else if (currentView === 'fractal') renderFractal(c);
  else if (currentView === 'constellation') renderConstellation(c);
  else if (currentView === 'flow') renderFlow(c);
  else if (currentView === 'scales') renderScales(c);
  else if (currentView === 'galaxy') renderGalaxy(c);
  else if (currentView === 'tiers') renderTiers(c);
  else if (currentView === 'primes') renderPrimes(c);
  else if (currentView === 'codex') renderCodex(c);
  else if (currentView === 'keystone') renderKeystone(c);
  else if (currentView === 'sphere') renderSphere(c);
  else if (currentView === 'helix') renderHelix(c);
  else if (currentView === 'orbits') renderOrbits(c);
  else if (currentView === 'lattice') renderLattice(c);
  else if (currentView === 'timeline') renderTimeline(c);
  else if (currentView === 'tree') renderTree(c);
  else if (currentView === 'cosmos') renderCosmos(c);
  else if (currentView === 'resonance') renderResonance(c);
  else if (currentView === 'anchors') renderAnchors(c);
  else if (currentView === 'antenna') renderAntenna(c);
  else if (currentView === 'broadcast') renderBroadcast(c);
  else if (currentView === 'self') renderSelf(c);
  else if (currentView === 'seven430') renderSeven430(c);
}

// ═══════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════
function frame() {
  animTime++;

  // Transition
  if (transitionProgress < 1) {
    transitionProgress = Math.min(1, transitionProgress + 0.02);
    const t = easeInOut(transitionProgress);
    groupPositions.forEach(gp => {
      gp.x = lerp(gp.fromX, gp.targetX, t);
      gp.y = lerp(gp.fromY, gp.targetY, t);
      gp.r = lerp(gp.fromR, gp.targetR, t);
    });
  }

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 1.5);
  bgGrad.addColorStop(0, 'rgba(20,18,30,1)');
  bgGrad.addColorStop(1, 'rgba(10,10,18,1)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Render view
  renderCurrentView(ctx);

  // Particles
  updateParticles();
  renderParticles(ctx);

  // SVG labels
  updateLabels();

  requestAnimationFrame(frame);
}

// Wait for fonts then start
document.fonts.ready.then(() => {
  resize();
  frame();
}).catch(() => {
  // Fallback: start after 3s even if font fails
  setTimeout(() => { resize(); frame(); }, 3000);
});

// Also start after 3s as safety net
setTimeout(() => {
  if (animTime === 0) { resize(); frame(); }
}, 3000);
</script>
