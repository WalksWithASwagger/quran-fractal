name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest

      - name: Verify source file hashes
        run: python -c "from quran_fractal.hashes import all_hashes_valid; from pathlib import Path; assert all_hashes_valid(Path('.')), 'Source file hash verification failed'"

      - name: Packaging smoke test
        run: python -m quran_fractal verify --base-dir . --summary-output build/ci-summary.json

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Web lint
        run: npm run lint

      - name: Web build
        run: npm run build

      - name: Production dependency audit
        run: npm audit --omit=dev
